name: Release
env:
  GH_TOKEN: ${{ SECRETS.GITHUB_TOKEN }}
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  create-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}
    steps:
      - uses: actions/checkout@v6

      - name: Create or reuse draft release
        id: create-release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const { owner, repo } = context.repo;

            // Reuse an existing draft for this tag if one already exists,
            // so re-running the workflow doesn't pile up duplicates.
            const releases = await github.paginate(
              github.rest.repos.listReleases,
              { owner, repo, per_page: 100 }
            );
            const existing = releases.find(
              (r) => r.tag_name === tag && r.draft
            );
            if (existing) {
              core.info(`Reusing existing draft release ${existing.id} for ${tag}`);
              return existing.id;
            }

            const { data } = await github.rest.repos.createRelease({
              owner,
              repo,
              tag_name: tag,
              name: tag,
              body: 'See the assets to download this version and install.',
              draft: true,
              prerelease: false,
            });
            core.info(`Created draft release ${data.id} for ${tag}`);
            return data.id;

  publish-tauri:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest" # for Arm64
            args: "--target aarch64-apple-darwin"
          - platform: "macos-15-intel" # for Intel
            args: "--target x86_64-apple-darwin"
          - platform: "ubuntu-24.04"
            args: ""
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: "pnpm"

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # Those targets are only used on macos runners so it's in an `if` to slightly speed up windows and linux builds.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || matrix.platform == 'macos-13' && 'x86_64-apple-darwin' || '' }}

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libfuse2 \
            libsoup-3.0-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            xdg-utils \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-bad \
            fonts-noto-color-emoji \
            pkg-config \
            unzip

      - name: install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2.9.1
        with:
          workspaces: src-tauri

      - name: Override tauri-cli with custom AppImage format (Linux)
        if: matrix.platform == 'ubuntu-24.04'
        run: cargo install tauri-cli --git https://github.com/tauri-apps/tauri --branch feat/truly-portable-appimage --force

      - uses: tauri-apps/tauri-action@v0.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_BUNDLER_NEW_APPIMAGE_FORMAT: "true"
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          tauriScript: ${{ matrix.platform == 'ubuntu-24.04' && 'cargo tauri' || 'pnpm tauri' }}
          args: ${{ matrix.args }}

      - name: Upload portable executable (Windows only)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          $src = "src-tauri\target\release\tabularis.exe"
          $portable = "tabularis_${version}_x64-portable.exe"
          Copy-Item $src $portable
          gh release upload "${{ github.ref_name }}" $portable --clobber
